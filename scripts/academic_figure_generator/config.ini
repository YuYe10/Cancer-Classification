# Academic Figure Generator Configuration
# ========================================
#
# This file contains default configuration parameters for the
# Academic Figure Generator package.

# =============================================================================
# Chart Style Configuration
# =============================================================================

[chart_style]
# Figure dimensions in inches (width x height)
figsize_width = 8.0
figsize_height = 6.0

# Resolution for raster outputs (dots per inch)
dpi = 300

# Font settings
font_family = "serif"        # Options: "serif", "sans-serif", "monospace"
font_size = 12.0
title_font_size = 14.0
label_font_size = 12.0
legend_font_size = 10.0

# Line and marker settings
line_width = 2.0
marker_size = 8.0

# Color scheme (matplotlib colormap name or list of hex colors)
# Options: "tab10", "tab20", "Set1", "Set2", "paired", or custom list
color_scheme = "tab10"

# Grid and axis settings
grid_alpha = 0.3
spine_line_width = 1.0
tick_length = 5
tick_width = 1.0

# =============================================================================
# Error Bar Configuration
# =============================================================================

[error_bars]
# Show error bars by default
show = true

# Error calculation method: "std", "sem", "ci", "raw"
method = "std"

# Confidence level for CI (0.0 to 1.0)
confidence_level = 0.95

# Error bar cap settings
cap_size = 5.0
cap_thickness = 1.5

# =============================================================================
# Output Configuration
# =============================================================================

[output]
# Base output directory
output_dir = "outputs"

# Output formats (comma-separated list)
formats = "pdf,svg"

# Create subdirectories by figure type
organization = "type"          # Options: "type", "chapter", "flat"

# Subdirectories
figure_dir = "figures"
data_dir = "data"

# Add timestamps to filenames (useful for version tracking)
timestamp = false

# Create manifest file documenting all generated figures
create_manifest = true

# =============================================================================
# Figure Type Directories
# =============================================================================

[figure_types]
# Subdirectories created under figures/
line = "line"
bar = "bar"
scatter = "scatter"
heatmap = "heatmap"
box = "box"
confusion_matrix = "confusion_matrix"
roc = "roc"
pr = "pr"
tsne = "tsne"
other = "other"

# =============================================================================
# Chapter Directories (alternative organization)
# =============================================================================

[chapters]
introduction = "01_introduction"
background = "02_background"
data = "03_data"
method = "04_method"
experiments = "05_experiments"
results = "06_results"
discussion = "07_discussion"
conclusion = "08_conclusion"
appendix = "09_appendix"

# =============================================================================
# LaTeX Document Settings
# =============================================================================

[latex]
# Default figure width as fraction of text width
default_width = 0.9

# Default figure position in LaTeX float
# h = here, t = top, b = bottom, p = page
default_position = "htbp"

# Use subfigure package for multi-panel figures
use_subfigure = true

# =============================================================================
# Academic Publication Presets
# =============================================================================

[presets.conference]
# IEEE/Conference format settings
figsize_width = 7.0
figsize_height = 5.5
font_family = "sans-serif"
dpi = 300

[presets.journal]
# Standard journal format settings
figsize_width = 8.5
figsize_height = 6.0
font_family = "serif"
dpi = 300

[presets.thesis]
# Thesis/dissertation format settings
figsize_width = 6.5
figsize_height = 5.0
font_family = "serif"
dpi = 300

# =============================================================================
# Color Schemes
# =============================================================================

[colors.tab10]
# Default matplotlib tab10 colors
0 = "#1f77b4"   # Blue
1 = "#ff7f0e"   # Orange
2 = "#2ca02c"   # Green
3 = "#d62728"   # Red
4 = "#9467bd"   # Purple
5 = "#8c564b"   # Brown
6 = "#e377c2"   # Pink
7 = "#7f7f7f"   # Gray
8 = "#bcbd22"   # Olive
9 = "#17becf"   # Cyan

[colors.accessible]
# Colorblind-friendly palette
background = "#88CCEE"
signal1 = "#CC6677"
signal2 = "#DDCC77"
signal3 = "#117733"
signal4 = "#661100"
signal5 = "#888888"

# =============================================================================
# Data Processing Defaults
# =============================================================================

[data_processing]
# Missing value handling strategy: mean, median, mode, drop, fill
missing_strategy = "mean"

# Outlier detection method: iqr, zscore
outlier_method = "iqr"
outlier_threshold = 1.5

# Normalization method: zscore, minmax, none
normalization = "zscore"
