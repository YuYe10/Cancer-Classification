# XGBoost Hyperparameter Sensitivity: Shallow trees (max_depth=2)
# Purpose: Test whether shallow decision stumps improve robustness by limiting model complexity
# Hypothesis: Depth-2 trees act as strong regularizers; may reduce overfitting at cost of underfitting complex patterns
# Rationale: With only 8 leaf nodes per tree, each tree captures simple interactions; ensemble of many such trees approximates additive model
# Expected outcome: More stable but possibly lower peak accuracy than depth=6 baseline

exp: stacking

data:
  rna_path: datasets/TCGA-BRCA.star_counts.csv
  meth_path: datasets/TCGA-BRCA.methylation450.csv
  clinical_path: datasets/brca_pam50.csv

preprocess:
  rna_top_var: 2000
  meth_top_var: 2000

model:
  type: xgboost
  test_size: 0.2
  random_state: 42
  n_jobs: -1
  xgb_n_estimators: 1500
  xgb_max_depth: 2
  xgb_learning_rate: 0.02
  xgb_subsample: 0.85
  xgb_colsample_bytree: 0.80
  xgb_reg_lambda: 1.5
  xgb_min_child_weight: 1.0
  xgb_tree_method: hist

stacking:
  base_model_type: xgboost
  meta_model_type: xgboost
  meta_cv_splits: 5

mofa:
  factors: 20
