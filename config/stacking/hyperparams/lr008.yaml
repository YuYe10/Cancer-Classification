# XGBoost Hyperparameter Sensitivity: High learning rate (0.08)
# Purpose: Test whether faster learning with fewer trees can match or exceed conservative settings
# Hypothesis: Higher LR may capture dominant patterns quickly but risk overfitting on noise
# Expected outcome: Faster training but potentially higher variance across CV folds; useful for speed/accuracy trade-off analysis
# Runtime note: ~3-4× faster than exp_stacking_sota_cv.yaml due to fewer trees

exp: stacking

data:
  rna_path: datasets/TCGA-BRCA.star_counts.csv
  meth_path: datasets/TCGA-BRCA.methylation450.csv
  clinical_path: datasets/brca_pam50.csv

preprocess:
  rna_top_var: 2000
  meth_top_var: 2000

model:
  type: xgboost
  test_size: 0.2
  random_state: 42
  n_jobs: -1
  xgb_n_estimators: 300
  xgb_max_depth: 6
  xgb_learning_rate: 0.08
  xgb_subsample: 0.85
  xgb_colsample_bytree: 0.80
  xgb_reg_lambda: 1.5
  xgb_min_child_weight: 1.0
  xgb_tree_method: hist

stacking:
  base_model_type: xgboost
  meta_model_type: xgboost
  meta_cv_splits: 5

mofa:
  factors: 20
