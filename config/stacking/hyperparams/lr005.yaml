# XGBoost Hyperparameter Sensitivity: Low learning rate (0.005)
# Purpose: Test whether very slow learning with more trees improves generalization
# Hypothesis: Lower LR requires more trees but may produce smoother, more regularized decision boundaries
# Trade-off: 10× more boosting rounds → ~3-5× longer training time per fold
# Comparison baseline: exp_stacking_sota_cv.yaml (lr=0.02, n_est=900)

exp: stacking

data:
  rna_path: datasets/TCGA-BRCA.star_counts.csv
  meth_path: datasets/TCGA-BRCA.methylation450.csv
  clinical_path: datasets/brca_pam50.csv

preprocess:
  rna_top_var: 2000
  meth_top_var: 2000

model:
  type: xgboost
  test_size: 0.2
  random_state: 42
  n_jobs: -1
  xgb_n_estimators: 3000
  xgb_max_depth: 6
  xgb_learning_rate: 0.005
  xgb_subsample: 0.85
  xgb_colsample_bytree: 0.80
  xgb_reg_lambda: 1.5
  xgb_min_child_weight: 1.0
  xgb_tree_method: hist

stacking:
  base_model_type: xgboost
  meta_model_type: xgboost
  meta_cv_splits: 5

mofa:
  factors: 20
