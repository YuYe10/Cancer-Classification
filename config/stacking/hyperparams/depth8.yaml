# XGBoost Hyperparameter Sensitivity: Deep trees (max_depth=8)
# Purpose: Test whether deeper trees can capture higher-order feature interactions for multi-omics data
# Hypothesis: Deeper trees may model complex RNA-methylation interactions better but increase overfitting risk
# Risk warning: With ~2000 features and depth=8, each tree has up to 256 leaves — high capacity relative to sample size
# Expected outcome: Potentially higher train accuracy but similar or worse test accuracy vs depth=6 if overfitting occurs

exp: stacking

data:
  rna_path: datasets/TCGA-BRCA.star_counts.csv
  meth_path: datasets/TCGA-BRCA.methylation450.csv
  clinical_path: datasets/brca_pam50.csv

preprocess:
  rna_top_var: 2000
  meth_top_var: 2000

model:
  type: xgboost
  test_size: 0.2
  random_state: 42
  n_jobs: -1
  xgb_n_estimators: 700
  xgb_max_depth: 8
  xgb_learning_rate: 0.02
  xgb_subsample: 0.80
  xgb_colsample_bytree: 0.70
  xgb_reg_lambda: 2.0
  xgb_min_child_weight: 2.0
  xgb_tree_method: hist

stacking:
  base_model_type: xgboost
  meta_model_type: xgboost
  meta_cv_splits: 5

mofa:
  factors: 20
