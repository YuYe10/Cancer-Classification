# XGBoost Hyperparameter Sensitivity: Strong L2 regularization (lambda=3.0)
# Purpose: Test effect of stronger weight decay on model complexity and generalization
# Hypothesis: Higher lambda shrinks leaf weights toward zero, acting as implicit feature selection within trees
# Biological relevance: Multi-omics data contains many correlated features; strong regularization prevents reliance on spurious correlations
# Comparison baseline: exp_stacking_sota_cv.yaml (lambda=1.5)

exp: stacking

data:
  rna_path: datasets/TCGA-BRCA.star_counts.csv
  meth_path: datasets/TCGA-BRCA.methylation450.csv
  clinical_path: datasets/brca_pam50.csv

preprocess:
  rna_top_var: 2000
  meth_top_var: 2000

model:
  type: xgboost
  test_size: 0.2
  random_state: 42
  n_jobs: -1
  xgb_n_estimators: 900
  xgb_max_depth: 6
  xgb_learning_rate: 0.02
  xgb_subsample: 0.85
  xgb_colsample_bytree: 0.80
  xgb_reg_lambda: 3.0
  xgb_min_child_weight: 1.0
  xgb_tree_method: hist

stacking:
  base_model_type: xgboost
  meta_model_type: xgboost
  meta_cv_splits: 5

mofa:
  factors: 20
