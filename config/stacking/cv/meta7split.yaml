# Stacking Variant: More inner CV splits for meta-feature generation (7-fold)
# Purpose: Sensitivity analysis of meta_cv_splits parameter (7 vs default 5)
# Hypothesis: More inner splits (7) give smaller training sets per fold but smoother OOF probability estimates
# Risk warning: With ~120 train samples per outer fold and 4 classes, 7 splits may leave <15 samples per class in some inner train sets
# Expected outcome: Slightly more stable meta-features but potentially weaker base models; net effect uncertain

exp: stacking

data:
  rna_path: datasets/TCGA-BRCA.star_counts.csv
  meth_path: datasets/TCGA-BRCA.methylation450.csv
  clinical_path: datasets/brca_pam50.csv

preprocess:
  rna_top_var: 2000
  meth_top_var: 2000

model:
  type: xgboost
  test_size: 0.2
  random_state: 42
  n_jobs: -1
  xgb_n_estimators: 900
  xgb_max_depth: 6
  xgb_learning_rate: 0.02
  xgb_subsample: 0.85
  xgb_colsample_bytree: 0.80
  xgb_reg_lambda: 1.5
  xgb_min_child_weight: 1.0
  xgb_tree_method: hist

stacking:
  base_model_type: xgboost
  meta_model_type: xgboost
  meta_cv_splits: 7

mofa:
  factors: 20
