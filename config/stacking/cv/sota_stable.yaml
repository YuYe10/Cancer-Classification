exp: stacking

data:
  rna_path: datasets/TCGA-BRCA.star_counts.csv
  meth_path: datasets/TCGA-BRCA.methylation450.csv
  clinical_path: datasets/brca_pam50.csv

preprocess:
  rna_top_var: 2200
  meth_top_var: 2200

model:
  type: xgboost
  test_size: 0.2
  random_state: 42
  n_jobs: -1
  xgb_n_estimators: 1200
  xgb_max_depth: 3
  xgb_learning_rate: 0.015
  xgb_subsample: 0.85
  xgb_colsample_bytree: 0.85
  xgb_reg_lambda: 1.5
  xgb_min_child_weight: 2.0
  xgb_tree_method: hist

stacking:
  base_model_type: xgboost
  meta_model_type: xgboost
  meta_cv_splits: 5

mofa:
  factors: 20
