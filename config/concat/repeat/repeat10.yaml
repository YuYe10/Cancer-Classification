# Concat: 10-repeat CV Sensitivity (baseline)
# Purpose: This matches the shared evaluation default; included for completeness
# Comparison baseline: config/concat/cv.yaml (10 repeats, 5 folds)
exp: concat
data:
  rna_path: datasets/TCGA-BRCA.star_counts.csv
  meth_path: datasets/TCGA-BRCA.methylation450.csv
  clinical_path: datasets/brca_pam50.csv
preprocess:
  rna_top_var: 500
  meth_top_var: 500
model:
  type: svm
  test_size: 0.2
  random_state: 42
evaluation:
  mode: repeated_cv
  folds: 5
  repeats: 10
mofa:
  factors: 20
