# MOFA Factor Sensitivity: 30 latent factors
# Purpose: Upper bound test — push factor count near sample size limit
# Hypothesis: Likely to overfit; MOFA may fail or produce unstable latent representations
# Risk warning: With ~150 samples, 30 factors may cause convergence issues in MOFA
# Expected outcome: Higher variance, potential numerical instability, possible performance drop vs 20

exp: mofa

data:
  rna_path: datasets/TCGA-BRCA.star_counts.csv
  meth_path: datasets/TCGA-BRCA.methylation450.csv
  clinical_path: datasets/brca_pam50.csv

preprocess:
  rna_top_var: 1000
  meth_top_var: 1000

model:
  type: svm
  test_size: 0.2
  random_state: 42

mofa:
  factors: 30
