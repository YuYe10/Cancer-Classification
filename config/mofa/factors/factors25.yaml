# MOFA Factor Sensitivity: 25 latent factors
# Purpose: Test whether more factors improve representation of fine-grained substructure
# Hypothesis: May slightly improve accuracy but risk overfitting on small sample sizes (~150 samples)
# Comparison baseline: exp_mofa.yaml (factors=20)
# Expected outcome: Similar or marginally better than 20, with higher variance across CV repeats

exp: mofa

data:
  rna_path: datasets/TCGA-BRCA.star_counts.csv
  meth_path: datasets/TCGA-BRCA.methylation450.csv
  clinical_path: datasets/brca_pam50.csv

preprocess:
  rna_top_var: 1000
  meth_top_var: 1000

model:
  type: svm
  test_size: 0.2
  random_state: 42

mofa:
  factors: 25
