exp: stacking

data:
  rna_path: datasets/TCGA-BRCA.star_counts.csv
  meth_path: datasets/TCGA-BRCA.methylation450.csv
  clinical_path: datasets/brca_pam50.csv

preprocess:
  rna_top_var: 2500
  meth_top_var: 2500

model:
  type: xgboost
  test_size: 0.2
  random_state: 42
  n_jobs: -1
  xgb_n_estimators: 700
  xgb_max_depth: 4
  xgb_learning_rate: 0.03
  xgb_subsample: 0.9
  xgb_colsample_bytree: 0.9
  xgb_reg_lambda: 1.0
  xgb_min_child_weight: 1.0
  xgb_tree_method: hist
  rf_n_estimators: 900
  rf_max_depth: null
  rf_min_samples_split: 2
  rf_min_samples_leaf: 1
  rf_max_features: sqrt
  rf_class_weight: balanced_subsample

stacking:
  base_model_type: random_forest
  meta_model_type: xgboost
  meta_cv_splits: 5

evaluation:
  mode: repeated_cv
  folds: 5
  repeats: 5

mofa:
  factors: 20
