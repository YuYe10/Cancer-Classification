# Ablation Experiment: NO feature selection (keep all features)
# Purpose: Verify the value of top-k feature selection in reducing overfitting
# Hypothesis: Removing feature selection should increase risk of overfitting and potentially degrade generalization
# WARNING: This config uses ALL features (~505K dims), which may be slow/memory-heavy

exp: concat

data:
  rna_path: datasets/TCGA-BRCA.star_counts.csv
  meth_path: datasets/TCGA-BRCA.methylation450.csv
  clinical_path: datasets/brca_pam50.csv

preprocess:
  rna_top_var: 20000
  meth_top_var: 500000

model:
  type: svm
  test_size: 0.2
  random_state: 42

mofa:
  factors: 20

ablation:
  use_rna: true
  use_meth: true
  use_feature_selection: false
