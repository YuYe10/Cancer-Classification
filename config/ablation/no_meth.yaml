# Ablation Experiment: RNA-only (NO methylation)
# Purpose: Verify the contribution of methylation data to classification performance
# Hypothesis: Removing methylation should decrease or not significantly improve accuracy compared to RNA-only baseline

exp: rna

data:
  rna_path: datasets/TCGA-BRCA.star_counts.csv
  meth_path: datasets/TCGA-BRCA.methylation450.csv
  clinical_path: datasets/brca_pam50.csv

preprocess:
  rna_top_var: 2000
  meth_top_var: 2000

model:
  test_size: 0.2
  random_state: 42

mofa:
  factors: 20

ablation:
  use_rna: true
  use_meth: false
  use_feature_selection: true
